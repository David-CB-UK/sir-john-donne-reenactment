<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Meta tags for search engines -->
    <meta name="description" content="Explore Sir John Donne via M. Bass's medieval re-enactments, events, galleries, and early historical research.">
    <meta name="keywords" content="Sir John Donne, medieval re-enactment, living history, historical research, M Bass, medieval events, event gallery, historical artefacts, English history, living history project, Kidwelly, 1420-1503">
    <title>Sir John Donne Re-enactment</title>

    <!-- Standard favicon -->
    <link rel="icon" type="image/png" sizes="96x96" href="assets/favicon/favicon-96x96.png">
    <!-- SVG favicon for modern browsers -->
    <link rel="icon" type="image/svg+xml" href="assets/favicon/favicon.svg">
    <!-- Apple touch icon -->
    <link rel="apple-touch-icon" sizes="180x180" href="assets/favicon/apple-touch-icon.png">
    <!-- Fallback for older browsers -->
    <link rel="shortcut icon" href="assets/favicon/favicon.ico" type="image/x-icon">
    <!-- Web App Manifest for PWA / Android -->
    <link rel="manifest" href="assets/favicon/site.webmanifest">
    <!-- Optional: specify web app icons -->
    <link rel="icon" sizes="192x192" href="assets/favicon/web-app-manifest-192x192.png">
    <link rel="icon" sizes="512x512" href="assets/favicon/web-app-manifest-512x512.png">
    <meta name="apple-mobile-web-app-title" content="Sir John Donne" />
    <link rel="manifest" href="/assets/favicon/site.webmanifest" />
    <!-- Stylesheet -->
    <link rel="stylesheet" type="text/css" href="assets/css/styles.css">

</head>

<body>
    <!-- Header-->
    <header>
        <a href="index.html" id="logo-container">
            <img src="assets/images/wolf-logo.webp" alt="Wolf Logo" id="logo-image" width="50" height="50">
            <h1 id="logo">Sir John Donne</h1>
        </a>
        <input type="checkbox" id="nav-toggle" class="nav-toggle">
        <label for="nav-toggle" class="nav-toggle-label">☰</label>
        <nav>
            <ul id="nav-menu">
                <!--span added to allow for better styling with hover effects-->
                <li><a href="index.html"><span>Home</span></a></li> 
                <li><a href="gallery.html"><span>Gallery</span></a></li>
                <li><a href="events.html"><span>Events</span></a></li>
                <li><a href="contact.html" class="active"><span>Contact</span></a></li> <!-- keep to show user is still within the Contact section even though message-sent page -->
            </ul>
        </nav>
    </header>
   
    <!-- Main content-->
    <main>
        <section id="contact-us">
             <form id="contact-form" method="POST" action="https://github.com/David-CB-UK/sir-john-donne-reenactment/formdump">
                <h2><i class="fa-solid fa-envelopes-bulk"></i> Get in Contact</h2>
                <label for="first-name">First Name: </label>
                <input type="text" name="first_name" id="first-name" class="text-input" required>
                <br>
                <label for="last-name">Last Name: </label>
                <input type="text" name="last_name" id="last-name" class="text-input" required>
                <br>
                <label for="email-address">Email Address: </label>
                <input type="email" name="email_address" id="email-address" class="text-input" required>
                <br>
                <div class="message-section">
                <label for="message">Your Message: </label>
                <br>
                <textarea name="message" id="message" rows="10" cols="30" placeholder="Add your message here..."></textarea>
                </div>
            </form>
        </section>
        
        <section id="message-sent">

                <h1><span class="star">✦</span> Message Sent <span class="star">✦</span> </h1>
                <br>
                <p>Thank you for thy message.<br>
                    as the parchment leaves thy hands,<br>
                    it shall be delivered posthaste.<br>
                    Expect a reply to reach thee in due time.</p>
                <br>
                <a href="index.html" class="button">Return to Homepage</a>                        
        </section>
    </main>
   
    <!-- Footer-->
    <footer>
      <div class="footer-content">

        <!-- Left Copyright-->
        <div class="footer-left">
            <p>© 2026 Sir Jon Donne</p>
        </div>

        <!-- Center -->
        <ul id="social-networks">
            <li><a href="https://www.facebook.com/" target="_blank"><i class="fa-brands fa-facebook facebook-icon"></i></a></li>
            <li><a href="https://www.youtube.com/" target="_blank"><i class="fa-brands fa-square-youtube youtube-icon"></i></a></li>
            <li><a href="https://www.x.com/" target="_blank"><i class="fa-brands fa-x-twitter twitter-icon"></i></a></li>
            <li><a href="https://www.instagram.com/" target="_blank"><i class="fa-brands fa-instagram instagram-icon"></i></a></li>
        </ul>

        <!-- Right contact us-->
        <div class="footer-right">
            <a href="contact.html">Contact us</a>
        </div>

      </div>
    </footer>

    <!-- Font Awesome Kit-->
    <script src="https://kit.fontawesome.com/e04219d6d1.js" crossorigin="anonymous"></script>

</body>

</html>
